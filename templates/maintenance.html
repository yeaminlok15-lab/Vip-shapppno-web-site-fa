<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | {{ site_name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a12;font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .card{background:rgba(10,10,20,0.85);backdrop-filter:blur(20px);border:2px solid #ef4444;border-radius:20px;padding:48px 40px;text-align:center;max-width:420px;box-shadow:0 0 60px #ef444422}
        .icon{font-size:64px;margin-bottom:16px;filter:drop-shadow(0 0 20px #ef4444)}
        .title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#ef4444;letter-spacing:4px;text-shadow:0 0 20px #ef4444;margin-bottom:8px}
        .sub{font-size:14px;color:#6b7280;letter-spacing:3px;margin-bottom:24px;font-weight:300}
        .message{background:rgba(0,0,0,0.3);border:2px solid #2a2a2a;border-radius:12px;padding:16px 20px;font-size:15px;color:#d1d5db;line-height:1.6;margin-bottom:24px;font-weight:400}
        .footer{font-size:12px;color:#374151;letter-spacing:2px;font-weight:300}
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔧</div>
        <div class="title">MAINTENANCE</div>
        <div class="sub">{{ site_name }} • SYSTEMS OFFLINE</div>
        <div class="message">{{ message }}</div>
        <div class="footer">⏳ PLEASE CHECK BACK LATER</div>
    </div>
</body>
</html>
